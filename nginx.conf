server {
  listen 80;

  client_max_body_size 25m;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
  gzip_min_length 256;

  root /usr/share/nginx/html;
  index index.html;

  # Arquivos estáticos do build (nunca devolve index.html no lugar de CSS/JS)
  location ^~ /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Estáticos do Django (WhiteNoise + collectstatic no backend; funciona com DEBUG=False)
  location ^~ /static/ {
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_pass http://backend:8000/static/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 75s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
  }

  # SPA (React Router): sempre retorna index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    proxy_pass http://backend:8000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 75s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;

    proxy_buffering on;
    proxy_buffer_size 8k;
    proxy_buffers 16 8k;
    proxy_busy_buffers_size 16k;
  }

  # Ficheiros enviados (logos/selos): volume partilhado com o backend (sem expor via Django)
  location /media/ {
    alias /usr/share/nginx/media/;
    access_log off;
    expires 7d;
    add_header Cache-Control "public";
  }
}

